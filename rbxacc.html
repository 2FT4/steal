<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RBX Darkliner</title>
    <style>
        /* Styles de base */
        body {
            margin: 0;
            padding: 0;
            background-color: #0b0b0b;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Animation de l'arrière-plan */
        .background-animation {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #1a0033, #000000, #001a33);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Animation du Titre principal */
        h1 {
            font-size: 5rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            /* Combinaison de deux animations : brillance et flottement */
            animation: glow 2s ease-in-out infinite alternate, float 3s ease-in-out infinite;
            text-shadow: 0 0 10px #8a2be2, 0 0 20px #8a2be2, 0 0 40px #8a2be2;
            margin-bottom: 50px;
            text-align: center;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #8a2be2, 0 0 20px #8a2be2, 0 0 30px #8a2be2; }
            to { text-shadow: 0 0 20px #ff00ff, 0 0 30px #ff00ff, 0 0 40px #ff00ff, 0 0 50px #ff00ff; }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        /* Conteneur des boutons */
        .btn-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* Design des boutons avec effet au survol */
        button {
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: 2px solid #8a2be2;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        /* Effet de reflet balayant le bouton */
        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: all 0.5s ease;
            z-index: -1;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            background: #8a2be2;
            box-shadow: 0 0 15px #8a2be2, 0 0 30px #8a2be2;
            transform: scale(1.1) translateY(-5px);
        }

        /* Animation de pulsation spécifique pour le bouton principal */
        .pulse-btn {
            animation: pulse 2s infinite;
            border-color: #ff00ff;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 0, 255, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 0, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 0, 255, 0); }
        }

    </style>
</head>
<body>
    <!-- Arrière-plan animé -->
    <div class="background-animation"></div>
    
    <!-- Titre géant -->
    <h1>RBX Darkliner</h1>
    
    <!-- Zone des boutons -->
    <div class="btn-container">
        <button class="pulse-btn">Démarrer</button>
        <button>Outils</button>
        <button>Dashboard</button>
        <button>Connexion</button>
    </div>
    
    <!-- Script pour l'effet de clic sur les boutons -->
    <script>
        const buttons = document.querySelectorAll('button');
        
        buttons.forEach(btn => {
            btn.addEventListener('click', function() {
                // Effet d'écrasement au clic
                this.style.transform = 'scale(0.9)';
                setTimeout(() => {
                    this.style.transform = 'scale(1.1) translateY(-5px)';
                }, 150);
            });
        });
    </script>
</body>
</html>
